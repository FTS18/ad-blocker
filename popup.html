<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 220px;
      background: #0f0f11;
      color: #e1e1e6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      margin: 0;
      padding: 12px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222225;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .title {
      font-weight: bold;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16161a;
      border: 1px solid #222225;
      padding: 10px;
      margin-bottom: 8px;
    }
    .status-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .status-label {
      color: #787880;
    }
    .status-val {
      font-weight: bold;
      color: #ff453a;
    }
    .status-val.active {
      color: #30d158;
    }
    .toggle-container {
      display: block;
      position: relative;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .toggle-container input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .custom-box {
      position: absolute;
      top: 0;
      left: 0;
      height: 18px;
      width: 18px;
      background-color: transparent;
      border: 1px solid #787880;
    }
    .toggle-container input:checked + .custom-box {
      background-color: #30d158;
      border-color: #30d158;
    }
    .toggle-container input:checked + .custom-box:after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 8px;
      border: solid #0f0f11;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .info {
      color: #787880;
      text-align: center;
      margin-top: 10px;
      font-size: 9px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">ad blocker</span>
    <span style="color: #787880">v1.0</span>
  </div>

  <div class="status-row">
    <div class="status-info">
      <span class="status-label">protection</span>
      <span class="status-val active" id="statusVal">active</span>
    </div>
    <label class="toggle-container">
      <input type="checkbox" id="toggleBlocker" checked>
      <span class="custom-box"></span>
    </label>
  </div>

  <div class="info">
    blocking ads and tracking scripts.
  </div>

  <script src="popup.js"></script>
</body>
</html>
