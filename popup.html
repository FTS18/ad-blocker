<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      background: #0f0f11;
      color: #e1e1e6;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      margin: 0;
      padding: 12px;
      user-select: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222225;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .title {
      font-weight: bold;
      color: #fff;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #16161a;
      border: 1px solid #222225;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }
    .status-row:hover {
      border-color: #333339;
    }
    .status-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .status-label {
      color: #787880;
    }
    .status-val {
      font-weight: bold;
      color: #ff453a;
    }
    .status-val.active {
      color: #30d158;
    }
    .status-val.whitelisted {
      color: #e6a23c;
    }
    .domain-name {
      color: #fff;
      font-weight: bold;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toggle-container {
      display: block;
      position: relative;
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .toggle-container input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .custom-box {
      position: absolute;
      top: 0;
      left: 0;
      height: 18px;
      width: 18px;
      background-color: transparent;
      border: 1px solid #787880;
      border-radius: 3px;
      transition: all 0.15s ease;
    }
    .toggle-container input:checked + .custom-box {
      background-color: #30d158;
      border-color: #30d158;
    }
    .toggle-container input:checked + .custom-box:after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 8px;
      border: solid #0f0f11;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .stats-panel {
      background: #16161a;
      border: 1px solid #222225;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .stats-header {
      font-weight: bold;
      border-bottom: 1px solid #222225;
      padding-bottom: 4px;
      margin-bottom: 8px;
      color: #787880;
      text-transform: uppercase;
      font-size: 8px;
      letter-spacing: 0.5px;
    }
    .stats-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .stats-item:last-child {
      margin-bottom: 0;
    }
    .stats-item-label {
      color: #787880;
    }
    .stats-item-val {
      font-weight: bold;
      color: #fff;
    }
    .stats-text-val {
      color: #30d158;
      max-width: 110px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 10px;
    }
    button {
      background: #30d158;
      border: none;
      color: #0f0f11;
      font-family: inherit;
      font-weight: bold;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      outline: none;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button.secondary {
      background: transparent;
      border: 1px solid #222225;
      color: #e1e1e6;
    }
    button.secondary:hover {
      background: #1c1c22;
    }
    .info {
      color: #787880;
      text-align: center;
      margin-top: 10px;
      font-size: 9px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">ad blocker</span>
    <span style="color: #787880">v1.3</span>
  </div>

  <!-- Global protection row -->
  <div class="status-row">
    <div class="status-info">
      <span class="status-label">protection</span>
      <span class="status-val active" id="statusVal">active</span>
    </div>
    <label class="toggle-container">
      <input type="checkbox" id="toggleBlocker" checked>
      <span class="custom-box"></span>
    </label>
  </div>



  <!-- Site-specific whitelisting row -->
  <div class="status-row" id="siteRow" style="display: none;">
    <div class="status-info">
      <span class="status-label" id="siteLabel">this website</span>
      <span class="domain-name" id="siteDomain">-</span>
    </div>
    <label class="toggle-container">
      <input type="checkbox" id="toggleSiteBlocker" checked>
      <span class="custom-box"></span>
    </label>
  </div>

  <!-- Categories Panel -->
  <div class="stats-panel" id="categoriesPanel">
    <div class="stats-header">filter lists</div>
    <div class="stats-item">
      <span class="stats-item-label">block ads</span>
      <label class="toggle-container">
        <input type="checkbox" id="blockAdsCheckbox" checked>
        <span class="custom-box"></span>
      </label>
    </div>
    <div class="stats-item">
      <span class="stats-item-label">block trackers</span>
      <label class="toggle-container">
        <input type="checkbox" id="blockTrackersCheckbox" checked>
        <span class="custom-box"></span>
      </label>
    </div>
    <div class="stats-item">
      <span class="stats-item-label">block annoyances</span>
      <label class="toggle-container">
        <input type="checkbox" id="blockAnnoyancesCheckbox" checked>
        <span class="custom-box"></span>
      </label>
    </div>
    <div class="stats-item">
      <span class="stats-item-label">block malware & scams</span>
      <label class="toggle-container">
        <input type="checkbox" id="blockMalwareCheckbox" checked>
        <span class="custom-box"></span>
      </label>
    </div>
  </div>

  <!-- Statistics Panel -->
  <div class="stats-panel">
    <div class="stats-header">block statistics</div>
    
    <div class="stats-item">
      <span class="stats-item-label">on this page</span>
      <span class="stats-item-val" id="pageBlockedCount" style="color: #30d158;">0</span>
    </div>
    
    <div class="stats-item">
      <span class="stats-item-label">total blocked</span>
      <span class="stats-item-val" id="totalBlockedCount">0</span>
    </div>
    
    <div class="stats-item" id="topTrackerItem" style="display: none;">
      <span class="stats-item-label">top tracker</span>
      <span class="stats-text-val" id="topTracker">-</span>
    </div>
    
    <div class="stats-item" id="topSiteItem" style="display: none;">
      <span class="stats-item-label">most ad-heavy site</span>
      <span class="stats-text-val" id="topSite">-</span>
    </div>
  </div>

  <!-- Toolbar -->
  <div style="display: flex; gap: 8px; margin-top: 8px;">
    <button id="pickerBtn" style="flex: 1;">Block Element</button>
    <button id="settingsBtn" class="secondary" style="flex: 1;">Dashboard</button>
  </div>

  <div class="info" id="infoMessage">
    blocking ads and tracking scripts.
  </div>

  <script src="popup.js"></script>
</body>
</html>
